<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>System Analysis</title>

<style>
body{
    margin:0;
    background:#000;
    color:#00ff00;
    font-family:Consolas,monospace;
    overflow:hidden;
}

#header{
    background:#111;
    color:red;
    text-align:center;
    padding:10px;
    font-size:24px;
    font-weight:bold;
}

#progress{
    width:100%;
    height:20px;
    background:#111;
}

#bar{
    width:0%;
    height:100%;
    background:#00ff00;
}

#terminal{
    height:calc(100vh - 60px);
    overflow:hidden;
    padding:10px;
    font-size:14px;
}

.warning{
    color:red;
}

.success{
    color:#00ffff;
}
</style>

</head>
<body>

<div id="header">SYSTEM ANALYSIS IN PROGRESS</div>

<div id="progress">
    <div id="bar"></div>
</div>

<div id="terminal"></div>

<script>

const terminal = document.getElementById("terminal");
const bar = document.getElementById("bar");

let progress = 0;

const actions = [
"Scanning system files",
"Checking security modules",
"Reviewing network activity",
"Loading diagnostics",
"Analyzing memory",
"Verifying permissions",
"Inspecting active processes",
"Reading system logs",
"Checking services",
"Analyzing connections",
"Indexing folders",
"Scanning downloads",
"Checking browser cache",
"Reviewing startup programs",
"Running diagnostics",
"Performing integrity check",
"Processing network packets",
"Reviewing firewall settings",
"Updating report",
"Generating analysis"
];

function randomIP(){
return Math.floor(Math.random()*255)+"."+
Math.floor(Math.random()*255)+"."+
Math.floor(Math.random()*255)+"."+
Math.floor(Math.random()*255);
}

function randomHex(){
return Math.random().toString(16).substring(2,12).toUpperCase();
}

function time(){
return new Date().toLocaleTimeString();
}

function addLine(){

let line=document.createElement("div");

let msg =
"["+time()+"] " +
actions[Math.floor(Math.random()*actions.length)] +
" | NODE:"+randomIP()+
" | ID:"+randomHex();

if(Math.random() > 0.95){
line.className="warning";
msg="["+time()+"] WARNING: Suspicious activity detected...";
}

if(Math.random() > 0.98){
line.className="success";
msg="["+time()+"] STATUS: Verification complete.";
}

line.textContent=msg;

terminal.appendChild(line);

terminal.scrollTop=terminal.scrollHeight;

if(terminal.children.length > 150){
terminal.removeChild(terminal.firstChild);
}

progress += Math.random()*0.35;

bar.style.width = progress+"%";

if(progress >= 100){

clearInterval(loop);

setTimeout(()=>{

let end=document.createElement("div");

end.innerHTML=
"<br><br>" +
"====================================<br>" +
"😂 PRANK LANG 😂<br>" +
"Walang totoong nangyari.<br>" +
"Simulation Complete.<br>" +
"====================================";

end.style.color="white";

terminal.appendChild(end);

},1000);

}

}

const loop=setInterval(addLine,50);

</script>

</body>
</html>
