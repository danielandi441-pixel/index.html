<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Hacking Simulation</title>

<style>
body{
    background:#000;
    color:#00ff00;
    font-family:Consolas,monospace;
    margin:0;
    padding:10px;
}
#title{
    color:red;
    text-align:center;
    font-size:32px;
    font-weight:bold;
}
#terminal{
    height:100vh;
    overflow:hidden;
    white-space:pre-wrap;
    font-size:30px;
}
</style>

</head>
<body>

<div id="title">⚠ HACKING IN PROGRESS ⚠</div>
<div id="terminal"></div>

<script>

const actions = [
"Scanning network",
"Checking security",
"Loading modules",
"Analyzing system",
"Searching files",
"Reading database",
"Decrypting archive",
"Processing packets",
"Checking users",
"Analyzing activity",
"Reviewing logs",
"Searching backups",
"Verifying access",
"Loading memory",
"Indexing folders",
"Collecting metadata",
"Reviewing permissions",
"Checking services",
"Analyzing connections",
"Monitoring traffic"
];

const results = [
"SUCCESS",
"COMPLETE",
"VERIFIED",
"FINISHED",
"PROCESSED",
"ANALYZED",
"INDEXED",
"SCANNED"
];

const terminal = document.getElementById("terminal");

let percent = 0;

function randomIP(){
    return Math.floor(Math.random()*255)+"."+
           Math.floor(Math.random()*255)+"."+
           Math.floor(Math.random()*255)+"."+
           Math.floor(Math.random()*255);
}

function randomHex(){
    return Math.random().toString(16).substring(2,12).toUpperCase();
}

function addLine(){

    const line =
    "["+String(percent).padStart(3,"0")+"%] " +
    actions[Math.floor(Math.random()*actions.length)] +
    " | NODE:"+randomIP()+
    " | HASH:"+randomHex()+
    " | STATUS:"+
    results[Math.floor(Math.random()*results.length)];

    const div=document.createElement("div");
    div.textContent=line;

    terminal.appendChild(div);
    terminal.scrollTop=terminal.scrollHeight;

    if(terminal.children.length>250){
        terminal.removeChild(terminal.firstChild);
    }

    percent += 0.07;

    if(percent>=100){

        clearInterval(loop);

        setTimeout(()=>{
            const end=document.createElement("div");
            end.innerHTML=
            "<br><br>😂😂😂 PRANK LANG 😂😂😂<br>" +
            "No hacking detected.<br>" +
            "Simulation Complete.";
            terminal.appendChild(end);
        },5000);
    }
}

/*
60ms × ~1400 lines ≈ 84 seconds
90ms × ~1400 lines ≈ 126 seconds
*/

const loop=setInterval(addLine,90);

</script>

</body>
</html>ñ
