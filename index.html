<!DOCTYPE html>
<html>
<head>
  <title>System Alert</title>
  <style>
    body {
      background-color: black;
      font-family: "Courier New", monospace;
      padding: 20px;
    }

    .box {
      max-width: 500px;
      margin: auto;
      border: 2px solid red;
      padding: 20px;
      box-shadow: 0 0 20px red;
      color: white;
      text-align: center;
    }

    .title {
      color: red;
      font-size: 20px;
      margin-bottom: 10px;
      animation: blink 0.8s infinite;
    }

    @keyframes blink {
      50% { opacity: 0; }
    }

    .line {
      font-size: 13px;
      margin: 4px 0;
      text-align: left;
    }

    .red { color: red; }
    .green { color: lime; }

    .loading {
      margin-top: 15px;
      color: yellow;
      font-size: 18px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="box">
  <div class="title">⚠️ YOUR PHONE IS HACKED ⚠️</div>

  <div id="log"></div>

  <div class="loading" id="load">LOADING SYSTEM... 0%</div>
</div>

<script>
let messages = [
  "SYSTEM: Access granted...",
  "SYSTEM: Security bypassed...",
  "SYSTEM: Scanning files...",
  "SYSTEM: Extracting data...",
  "SYSTEM: Uploading data...",
  "SYSTEM: Device compromised...",
  "SYSTEM: Final check running..."
];

let log = document.getElementById("log");
let load = document.getElementById("load");

let i = 0;

// 👉 SLOW RUN (isa-isa, may delay)
function runMessages() {
  if (i < messages.length) {
    let div = document.createElement("div");
    div.classList.add("line");

    if (i % 2 === 0) {
      div.classList.add("red");
    } else {
      div.classList.add("green");
    }

    // type effect per letter
    let text = messages[i];
    let j = 0;
    div.innerHTML = "";

    log.appendChild(div);

    let typing = setInterval(() => {
      div.innerHTML += text[j];
      j++;

      if (j >= text.length) {
        clearInterval(typing);
        i++;
        setTimeout(runMessages, 800); // delay before next line
      }
    }, 40);
  } else {
    startLoading();
  }
}

// 👉 LOADING (matagal ~2 mins)
function startLoading() {
  let percent = 0;

  let interval = setInterval(() => {
    percent++;

    load.innerHTML = "LOADING SYSTEM... " + percent + "%";

    if (percent >= 100) {
      clearInterval(interval);
      load.innerHTML = "COMPLETE YOUR DEVICE ACCESS";
      load.style.color = "lime";
    }

  }, 1200);
}

runMessages();
</script>

</body>
</html>
