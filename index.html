<!DOCTYPE html>
<html>
<head>
<title>System Alert</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background-color: black;
  font-family: "Courier New", monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  padding: 10px;
}

.box {
  width: 95vw;
  height: 90vh;
  border: 3px solid red;
  padding: 15px;
  box-shadow: 0 0 30px red, inset 0 0 20px rgba(255,0,0,0.3);
  color: white;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.title {
  color: red;
  font-size: clamp(18px, 5vw, 32px);
  margin-bottom: 20px;
  animation: blink 0.8s infinite;
  font-weight: bold;
}

@keyframes blink {
 50% { opacity: 0; }
}

#log {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 8px;
  overflow-y: auto;
}

.line {
  font-size: clamp(12px, 3.5vw, 18px);
  text-align: left;
  padding-left: 10px;
}

.red { color: red; }
.green { color: lime; }

.loading {
  margin-top: 20px;
  color: yellow;
  font-size: clamp(16px, 4vw, 24px);
  font-weight: bold;
}
</style>
</head>
<body>
<div class="box">
  <div class="title">⚠️ YOUR PHONE IS HACKED ⚠️</div>
  <div id="log"></div>
  <div class="loading" id="load">LOADING SYSTEM... 0%</div>
</div>

<script>
let messages = [
  "SYSTEM: Access granted...",
  "SYSTEM: Security bypassed...",
  "SYSTEM: Scanning files...",
  "SYSTEM: Extracting data...",
  "SYSTEM: Uploading data...",
  "SYSTEM: Device compromised...",
  "SYSTEM: Final check running..."
];

let log = document.getElementById("log");
let load = document.getElementById("load");
let i = 0;

function runMessages() {
  if (i < messages.length) {
    let div = document.createElement("div");
    div.classList.add("line");
    div.classList.add(i % 2 === 0? "red" : "green");

    let text = messages[i];
    let j = 0;
    log.appendChild(div);

    let typing = setInterval(() => {
      div.innerHTML += text[j];
      j++;
      if (j >= text.length) {
        clearInterval(typing);
        i++;
        setTimeout(runMessages, 800);
      }
    }, 40);
  } else {
    startLoading();
  }
}

function startLoading() {
  let percent = 0;
  let interval = setInterval(() => {
    percent++;
    load.innerHTML = "LOADING SYSTEM... " + percent + "%";
    if (percent >= 100) {
      clearInterval(interval);
      load.innerHTML = "COMPLETE. YOUR DEVICE ACCESS";
      load.style.color = "lime";
    }
  }, 1200);
}

runMessages();
</script>
</body>
</html>
